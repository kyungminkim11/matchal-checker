<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>맞팔체커</title><meta name="description" content="로그인 없이 Instagram 데이터 ZIP으로 맞팔을 안전하게 확인하고 직접 정리하는 브라우저 로컬 도구"><meta name="theme-color" content="#6557ff"><link rel="manifest" href="manifest.webmanifest?v=9111"><link rel="icon" href="icon.svg" type="image/svg+xml"><style>html,body{margin:0;min-height:100%;background:#f7f8fc;font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif}#boot{min-height:100vh;display:grid;place-items:center;color:#475467}.box{width:min(460px,calc(100% - 40px));padding:28px;text-align:center}.brand{width:54px;height:54px;margin:0 auto 16px;border-radius:17px;background:linear-gradient(145deg,#6657ff,#8b5cf6 55%,#ec4899);display:grid;place-items:center;color:#fff;font-size:20px;font-weight:900;box-shadow:0 14px 34px rgba(101,87,255,.25)}.spin{width:30px;height:30px;margin:16px auto;border:3px solid #e5e7ff;border-top-color:#6557ff;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}p{font-size:13px;line-height:1.6;color:#667085}.errorCode{display:block;margin-top:10px;font-size:11px;color:#98a2b3;word-break:break-all}.retry{height:44px;padding:0 18px;margin-top:12px;border:0;border-radius:12px;background:#6557ff;color:#fff;font-weight:800;cursor:pointer}</style></head><body><div id="boot"><div class="box"><div class="brand">M</div><strong>맞팔체커를 준비하고 있습니다</strong><div class="spin"></div><p id="status">최신 앱 파일을 확인하는 중입니다.</p></div></div><script>window.hardRetry=async()=>{try{if('caches'in window){for(const k of await caches.keys())await caches.delete(k)}if('serviceWorker'in navigator){for(const r of await navigator.serviceWorker.getRegistrations())await r.unregister()}}catch{}location.replace(location.pathname+'?v=9111&t='+Date.now())};(async()=>{const VERSION='9111';const status=document.getElementById('status');const files=['release/v910/part1.txt','release/v910/part2.txt','release/v910/part3.txt','release/v910/part4.txt','release/v910/part5.txt','release/v910/part6.txt'];const loadScript=src=>new Promise((resolve,reject)=>{const s=document.createElement('script');s.src=src;s.onload=resolve;s.onerror=()=>reject(new Error('fallback-load-failed'));document.head.appendChild(s)});try{status.textContent='앱 데이터를 불러오는 중입니다.';const parts=await Promise.all(files.map(async path=>{const r=await fetch(path+'?v='+VERSION,{cache:'reload'});if(!r.ok)throw new Error('asset-'+r.status+'-'+path);return r.text()}));const b64=parts.join('').replace(/\s+/g,'');if(!b64||b64.length%4!==0)throw new Error('invalid-base64-length');const raw=atob(b64);const bytes=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);status.textContent='화면을 구성하는 중입니다.';let html='';if(typeof DecompressionStream!=='undefined'){try{html=await new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'))).text()}catch{}}if(!html){status.textContent='호환 모드로 화면을 구성하는 중입니다.';if(!window.pako)await loadScript('https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako_inflate.min.js');html=new TextDecoder().decode(window.pako.ungzip(bytes))}if(!html.includes('<html')||!html.includes('맞팔체커'))throw new Error('invalid-app-document');document.open();document.write(html);document.close()}catch(e){console.error(e);document.getElementById('boot').innerHTML='<div class="box"><div class="brand">M</div><strong>페이지를 불러오지 못했습니다.</strong><p>앱 파일 또는 이전 캐시를 불러오는 과정에서 문제가 생겼습니다. 아래 버튼으로 캐시를 지우고 다시 연결해 주세요.</p><button class="retry" onclick="hardRetry()">캐시 초기화 후 다시 시도</button><span class="errorCode">오류 코드: '+String(e&&e.message||e)+'</span></div>'}})();</script></body></html>
